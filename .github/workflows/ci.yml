name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  linux-unit-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libfuse3-dev fuse3
      - name: Configure
        run: cmake -B build -DAGENTVFS_EBPF=OFF -DAGENTVFS_LDPRELOAD=ON
      - name: Build
        run: cmake --build build -j
      - name: Unit tests
        run: |
          ./build/tests/cas_test_working_tree
          ./build/tests/cas_test_write_buffer
          ./build/tests/cas_test_object_store
          ./build/tests/cas_test_branch_context
          ./build/tests/cas_test_branch_merge
          ./build/tests/cas_test_branch_merge_commit
          ./build/tests/cas_test_branch_merge_daemon || true
          ./build/tests/cas_test_branch_persistence || true
          ./build/tests/cas_test_blake3_simd
          ./build/tests/cas_test_telemetry_event
          ./build/tests/cas_test_telemetry_registry
          ./build/tests/cas_test_workspace_cli
          ./build/tests/cas_test_ebpf_backend
          ./build/tests/cas_test_fanotify_backend
          ./build/tests/cas_test_ptrace_backend
          ./build/tests/cas_test_ldpreload_backend
          ./build/tests/cas_test_bpftime_backend
          ./build/tests/cas_test_wasm_backend
          ./build/tests/cas_test_lua_backend
          ./build/tests/cas_test_ldpreload_preload

  macos-unit-tests:
    runs-on: macos-latest
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        # AGENTVFS_FUSE_T defaults to ON on Apple; disable it here so this
        # unit-only job doesn't require fuse-t.
        run: cmake -B build -DAGENTVFS_EBPF=OFF -DAGENTVFS_FUSE_T=OFF
      - name: Build
        run: cmake --build build -j
      - name: Unit tests
        run: |
          ./build/tests/cas_test_working_tree
          ./build/tests/cas_test_write_buffer
          ./build/tests/cas_test_object_store
          ./build/tests/cas_test_branch_context
          ./build/tests/cas_test_branch_merge
          ./build/tests/cas_test_branch_merge_commit
          ./build/tests/cas_test_blake3_simd
          ./build/tests/cas_test_telemetry_event
          ./build/tests/cas_test_telemetry_registry
          ./build/tests/cas_test_workspace_cli
          ./build/tests/cas_test_fuse_t_preflight

  windows-unit-tests:
    runs-on: windows-latest
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        # Build only unit targets here; WinFsp is reserved for system tests.
        run: cmake -B build -DAGENTVFS_EBPF=OFF -DAGENTVFS_WINFSP=OFF
      - name: Build
        run: cmake --build build --config Release -j
      - name: Unit tests
        run: |
          .\build\tests\Release\cas_test_working_tree.exe
          .\build\tests\Release\cas_test_write_buffer.exe
          .\build\tests\Release\cas_test_branch_context.exe
          .\build\tests\Release\cas_test_branch_merge.exe
          .\build\tests\Release\cas_test_blake3_simd.exe
          .\build\tests\Release\cas_test_telemetry_event.exe
          .\build\tests\Release\cas_test_win_helpers.exe
          .\build\tests\Release\cas_test_named_pipe_channel.exe

  linux-system-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libfuse3-dev fuse3 netcat-openbsd
      - name: Configure
        run: cmake -B build -DAGENTVFS_EBPF=OFF -DAGENTVFS_FANOTIFY=ON -DAGENTVFS_PTRACE=ON -DAGENTVFS_LDPRELOAD=ON -DAGENTVFS_BPFTIME=ON -DAGENTVFS_WASM=ON -DAGENTVFS_LUA=ON
      - name: Build
        run: cmake --build build -j
      - name: System tests
        run: |
          bash tests/system/test_agentvfs_ctl.sh
          bash tests/system/test_workspace_cli.sh
          bash tests/system/test_cas_smoke.sh
          bash tests/system/test_cas_bootstrap.sh
          bash tests/system/test_cas_fh_lifecycle.sh
          bash tests/system/test_cas_branching.sh
          bash tests/system/test_cas_branch_merge.sh
          bash tests/system/test_cas_multi_branch.sh
          bash tests/system/test_cas_multi_branch_merge.sh
          bash tests/system/test_workspace_multi_branch.sh
          bash tests/system/test_cas_10cp_rollback.sh
          bash tests/system/test_cas_10cp_ebpf.sh
          bash tests/system/test_cas_telemetry.sh
          bash tests/system/test_cas_telemetry_ramp.sh
          bash tests/system/test_cas_backend_compare.sh
          bash tests/system/test_cas_multi_backend.sh
          bash tests/system/test_cas_multi_branch_ebpf.sh
          bash tests/system/test_cas_fanotify.sh
          bash tests/system/test_cas_ptrace.sh
          bash tests/system/test_cas_ldpreload.sh
          bash tests/system/test_cas_bpftime.sh
          bash tests/system/test_cas_lua.sh
          bash tests/system/test_cas_wasm.sh
          bash tests/system/test_start_sh.sh
          bash tests/system/test_quickstart_demo_smoke.sh

  windows-system-tests:
    runs-on: windows-latest
    strategy: { fail-fast: false }
    steps:
      - uses: actions/checkout@v4
      - name: Install WinFsp
        shell: powershell
        run: choco install winfsp -y --no-progress
      - name: Add WinFsp bin to PATH
        shell: powershell
        # choco installs the SDK but doesn't put winfsp-x64.dll on PATH.
        # agentvfs.exe links against winfsp-x64.lib (import lib) and so
        # needs the DLL at load time, otherwise the loader aborts with
        # STATUS_DLL_NOT_FOUND before main() runs.
        run: |
          $winfspBin = "C:\Program Files (x86)\WinFsp\bin"
          if (-not (Test-Path $winfspBin)) {
            $winfspBin = "C:\Program Files\WinFsp\bin"
          }
          Add-Content -Path $env:GITHUB_PATH -Value $winfspBin
          Write-Host "Added to PATH: $winfspBin"
          Get-ChildItem $winfspBin -Filter winfsp-*.dll | Format-Table
      - name: Configure
        run: cmake -B build -DAGENTVFS_EBPF=OFF -DAGENTVFS_WINFSP=ON
      - name: Build
        run: cmake --build build --config Release -j
      - name: System tests
        shell: powershell
        run: ./tests/system/windows/test_winfsp_e2e.ps1

  macos-system-tests:
    runs-on: macos-latest
    strategy: { fail-fast: false }
    steps:
      - uses: actions/checkout@v4
      - name: Install fuse-t
        run: brew install --cask macos-fuse-t/cask/fuse-t
      - name: Configure
        run: cmake -B build -DAGENTVFS_EBPF=OFF -DAGENTVFS_FUSE_T=ON
      - name: Build
        run: cmake --build build -j
      - name: System tests
        run: bash tests/system/test_macos_e2e.sh
